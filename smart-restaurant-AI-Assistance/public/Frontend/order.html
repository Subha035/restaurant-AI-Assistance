<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Online | Restaurant AI</title>
    <style>
        :root {
            --bg-dark: #060b13;
            --bg-surface: rgba(15, 23, 42, 0.6);
            --bg-surface-lucid: rgba(30, 41, 59, 0.4);
            --border-glow: rgba(245, 158, 11, 0.15);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-gold: #f59e0b;
            --accent-orange: #ea580c;
            --accent-gradient: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%);
            --accent-success: #10b981;
            --radius-lg: 24px;
            --radius-md: 16px;
            --font-stack: 'Inter', system-ui, -apple-system, sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--font-stack);
            color: var(--text-main);
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(245, 158, 11, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(234, 88, 12, 0.06) 0%, transparent 50%);
            background-attachment: fixed;
            padding: 24px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }

        .page-shell {
            width: min(100%, 1100px);
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            padding: 32px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: 24px;
        }

        header h1 {
            margin: 0 0 8px 0;
            font-size: clamp(1.8rem, 3vw, 2.5rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 1rem;
            max-width: 60ch;
            line-height: 1.6;
        }

        .back-btn {
            padding: 12px 24px;
            border-radius: var(--radius-md);
            background: var(--bg-surface-lucid);
            border: 1px solid var(--border-subtle);
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 32px;
        }

        .menu-panel, .checkout-panel {
            background: rgba(30, 41, 59, 0.25);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 28px;
        }

        .checkout-panel {
            position: sticky;
            top: 24px;
            align-self: start;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            gap: 16px;
        }

        .panel-title {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--accent-gradient);
            border-radius: 2px;
            display: inline-block;
        }

        .category-select-wrapper {
            position: relative;
            min-width: 140px;
        }

        .category-select-wrapper select, .checkout-form select {
            width: 100%;
            padding: 10px 36px 10px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-subtle);
            background: #0f172a;
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 500;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .category-select-wrapper select:hover, .checkout-form select:hover {
            border-color: rgba(245, 158, 11, 0.4);
        }

        .category-select-wrapper::after,
        .select-with-arrow::after {
            content: '';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23cbd5e1' d='M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z'/></svg>");
            background-size: contain;
            background-repeat: no-repeat;
            pointer-events: none;
        }

        .select-with-arrow {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .select-with-arrow select {
            width: 100%;
            padding-right: 44px;
        }

        .category-select-wrapper option, .checkout-form option {
            background-color: #0f172a;
            color: var(--text-main);
            padding: 12px;
        }

        .item-list {
            display: grid;
            gap: 16px;
        }

        .item-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            align-items: center;
            padding: 18px 20px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-subtle);
            transition: var(--transition-smooth);
        }

        .item-row:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--border-glow);
            transform: scale(1.01);
        }

        .item-title {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .item-title strong {
            font-size: 1.05rem;
            font-weight: 600;
            color: #ffffff;
        }

        .item-title span {
            color: var(--text-muted);
            font-size: 0.88rem;
            line-height: 1.4;
        }

        .item-actions {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .item-price {
            font-weight: 700;
            color: var(--accent-gold);
            font-size: 1.1rem;
            min-width: 75px;
            text-align: right;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            background: #0f172a;
            border: 1px solid var(--border-subtle);
            border-radius: 30px;
            padding: 4px;
        }

        .quantity-controls button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: var(--transition-smooth);
        }

        .quantity-controls button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--accent-gold);
        }

        .quantity-controls .btn-add:hover {
            background: var(--accent-gradient);
            color: #000;
        }

        .item-count {
            font-size: 0.95rem;
            font-weight: 600;
            min-width: 32px;
            text-align: center;
        }

        .summary-card {
            background: #0f172a;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 24px;
            display: grid;
            gap: 12px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .summary-row strong {
            color: var(--text-main);
        }

        .summary-row.grand-total {
            border-top: 1px solid var(--border-subtle);
            padding-top: 12px;
            margin-top: 4px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffffff;
        }

        .summary-row.grand-total strong {
            color: var(--accent-gold);
            font-size: 1.3rem;
        }

        .checkout-form {
            display: grid;
            gap: 20px;
        }

        .checkout-form label {
            display: grid;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .checkout-form input, .checkout-form select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-subtle);
            background: #0f172a;
            color: var(--text-main);
            font-size: 0.98rem;
            outline: none;
            transition: var(--transition-smooth);
        }

        .checkout-form input:focus, .checkout-form select:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
        }

        .checkout-form input.valid {
            border-color: #34d399;
            box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.18);
        }

        .checkout-form input.invalid {
            border-color: #f87171;
            box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.18);
        }

        .select-with-arrow {
            position: relative;
        }

        .pay-button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 700;
            color: #060b13;
            background: var(--accent-gradient);
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.2);
            transition: var(--transition-smooth);
        }

        .pay-button:hover:not([disabled]) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(245, 158, 11, 0.35);
        }

        .pay-button:disabled {
            background: #1e293b;
            color: #64748b;
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.6;
        }

        .validation-error {
            font-size: 0.85rem;
            color: #ef4444;
            margin-top: 4px;
        }

        .validation-error.success {
            color: #34d399;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 12, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: grid;
            place-items: center;
            padding: 20px;
            z-index: 100;
            transition: var(--transition-smooth);
        }

        .modal-backdrop.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .modal-card {
            width: min(100%, 460px);
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
            position: relative;
            display: grid;
            gap: 24px;
            text-align: center;
        }

        .modal-close {
            position: absolute;
            right: 18px;
            top: 18px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
            display: grid;
            place-items: center;
            transition: var(--transition-smooth);
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .qr-card {
            position: relative;
            padding: 18px;
            border-radius: var(--radius-md);
            background: #ffffff;
            display: inline-block;
            margin: 0 auto;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: var(--transition-smooth);
            overflow: hidden; /* Encapsulates the sweeping matrix line */
        }

        .qr-card.loading {
            background: #0f172a; /* Blends nicely with the modal card while loading */
            border: 1px solid rgba(245, 158, 11, 0.3);
            animation: cyber-pulse 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            min-width: 180px;
            min-height: 180px;
        }

        /* Matrix Scanline Sweeping Effect */
        .qr-card.loading::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                transparent 0%,
                rgba(245, 158, 11, 0.1) 40%,
                rgba(245, 158, 11, 0.6) 50%,
                rgba(245, 158, 11, 0.1) 60%,
                transparent 100%
            );
            background-size: 100% 200%;
            animation: scanline 2.5s ease-in-out infinite;
            z-index: 2;
        }

        .qr-card .qr-loader {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            background: rgba(6, 11, 19, 0.85);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: inherit;
            z-index: 3;
        }

        /* Tech Radar Tracker Loader */
        .qr-card .qr-loader span {
            position: relative;
            width: 60px;
            height: 60px;
            border: 2px solid rgba(245, 158, 11, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Rotating Outer Radar Wing */
        .qr-card .qr-loader span::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--accent-gold);
            border-bottom-color: var(--accent-orange);
            animation: spin 1.2s cubic-bezier(0.53, 0.21, 0.29, 0.67) infinite;
        }

        /* Pulsing Core Target */
        .qr-card .qr-loader span::after {
            content: '';
            width: 12px;
            height: 12px;
            background: var(--accent-gradient);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent-gold);
            animation: target-pulse 1.2s ease-in-out infinite alternate;
        }

        /* --- ADVANCED ANIMATION KEYFRAMES --- */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        @keyframes cyber-pulse {
            0%, 100% { 
                box-shadow: 0 0 20px rgba(245, 158, 11, 0.15), inset 0 0 15px rgba(245, 158, 11, 0.05);
                border-color: rgba(245, 158, 11, 0.2);
            }
            50% { 
                box-shadow: 0 0 35px rgba(245, 158, 11, 0.35), inset 0 0 25px rgba(245, 158, 11, 0.15);
                border-color: rgba(245, 158, 11, 0.6);
            }
        }

        @keyframes target-pulse {
            from { transform: scale(0.8); opacity: 0.5; }
            to { transform: scale(1.3); opacity: 1; }
        }

        .order-details {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 16px;
            text-align: left;
            display: grid;
            gap: 8px;
            font-size: 0.95rem;
        }

        .order-details div {
            display: flex;
            justify-content: space-between;
        }

        .order-details strong {
            color: var(--text-muted);
            font-weight: 500;
        }

        @media (max-width: 900px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
            .checkout-panel {
                position: static;
            }
            body {
                padding: 12px 8px;
            }
            .page-shell {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header>
            <div>
                <h1>Order Instantly</h1>
                <p>Build your perfect meal, review your cart and finish checkout instantly through our lightweight seamless payment simulator.</p>
            </div>
            <a href="index.html" class="back-btn">← Back to Chat</a>
        </header>

        <div class="content-grid">
            <section class="menu-panel">
                <div class="panel-header">
                    <h2 class="panel-title">Explore Menu</h2>
                    <div class="category-select-wrapper">
                        <select id="categorySelect">
                            <option value="breakfast">Breakfast</option>
                            <option value="lunch">Lunch</option>
                            <option value="dinner">Dinner</option>
                            <option value="wine">Wine</option>
                        </select>
                    </div>
                </div>
                <div class="item-list" id="menuList"></div>
            </section>

            <aside class="checkout-panel">
                <h2 class="panel-title" style="margin-bottom: 24px;">Order Summary</h2>
                <div class="summary-card">
                    <div class="summary-row"><span>Subtotal</span><strong id="subtotal">₹0</strong></div>
                    <div class="summary-row"><span>Taxes & Fees (5%)</span><strong id="taxes">₹0</strong></div>
                    <div class="summary-row grand-total"><span>Total Amount</span><strong id="total">₹0</strong></div>
                </div>

                <form class="checkout-form" id="checkoutForm">
                    <label>
                        Full Name
                        <input type="text" id="customerName" placeholder="Enter your name" required />
                    </label>
                    <label>
                         Phone Number
                         <input type="tel" id="customerPhone" placeholder="+91 98765 43210" required inputmode="tel" autocomplete="tel" />
                         <div id="phoneError" class="validation-error" aria-live="polite"></div>
                    </label>
                    <label>
                        Payment Method
                        <span class="select-with-arrow">
                            <select id="paymentMethod">
                                <option value="cash">Cash on Delivery</option>
                                <option value="card">Credit / Debit Card</option>
                                <option value="upi">UPI Apps (GPay/PhonePe)</option>
                                <option value="netbanking">Net Banking</option>
                            </select>
                        </span>
                    </label>
                    <button id="payNowButton" type="submit" class="pay-button" disabled aria-disabled="true" title="Add items to enable">Verify & Pay Now</button>
                </form>

                <div id="successMessage"></div>
            </aside>
        </div>
    </div>

    <!-- Modal Layout -->
    <div class="modal-backdrop hidden" id="orderModal">
        <div class="modal-card">
            <button class="modal-close" id="closeOrderModal">×</button>
            <h2 style="margin:0; font-size:1.6rem; color:var(--accent-success);">✓ Order Confirmed</h2>
            <p id="modalMessage" style="margin:0; color:var(--text-muted); line-height:1.5;"></p>
            <div class="qr-card">
                <div id="qrCode"></div>
            </div>
            <div class="order-details">
                <div><strong>Sequence:</strong> <span id="orderSequence">-</span></div>
                <div><strong>Order ID:</strong> <span id="orderNumber">-</span></div>
                <div><strong>Total Paid:</strong> <span id="orderTotal" style="color:var(--accent-gold); font-weight:700;">-</span></div>
            </div>
            <button class="pay-button" id="closeModalButton" type="button">Close window</button>
        </div>
    </div>

    <script src="order.js"></script>
</body>
</html>
